<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-R45T9C7D1G"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-R45T9C7D1G');
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hamza Abd ElKadir | Mechanical Design Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#c8102e;--ink:#0f172a;--ink2:#334155;--ink3:#64748b;--paper:#f8fafc;--white:#fff;--rule:#e2e8f0;--nh:60px;}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);line-height:1.7;overflow-x:hidden}
.pg{display:none;animation:fadeIn 0.4s ease;}
.pg.on{display:block}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.wrap{width:100%;max-width:1160px;margin-inline:auto;padding-inline:clamp(1.25rem,4vw,3.5rem)}
img,video{display:block;width:100%;height:100%;object-fit:cover}

/* ── NAV ── */
nav{position:fixed;top:0;width:100%;z-index:999;height:var(--nh);background:rgba(255,255,255,.98);border-bottom:1px solid var(--rule);display:flex;align-items:center;}
.nav-in{width:100%;max-width:1160px;margin:0 auto;padding-inline:clamp(1.25rem,4vw,3.5rem);display:flex;justify-content:space-between;align-items:center;}
.nav-logo{font-weight:800;cursor:pointer;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-size:.7rem;font-weight:600;text-transform:uppercase;color:var(--ink3);cursor:pointer;}
.nav-cv{font-size:.65rem;font-weight:700;text-transform:uppercase;padding:.4rem 1.2rem;border:1.5px solid var(--ink);border-radius:4px;cursor:pointer;}

/* ── HOME ── */
#pg-home{padding-top:calc(var(--nh) + 5rem);padding-bottom:5rem}
.hero-split{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;}
.hero-h1{font-size:clamp(2.5rem,5vw,4rem);font-weight:800;margin-bottom:1rem;}
.hero-photo{aspect-ratio:4/5;border-radius:6px;overflow:hidden;background:#e2e8f0;}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--rule);border-radius:8px;margin-block:5rem;background:var(--white);}
.stat-item{padding:2rem 1rem;text-align:center;border-right:1px solid var(--rule);}
.stat-num{font-size:2.5rem;font-weight:900;color:var(--red);}

/* ── PROJECT CARDS ── */
.cards{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--rule);border-left:1px solid var(--rule);}
.card{background:var(--white);cursor:pointer;position:relative;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);}
.card-cover{aspect-ratio:3/2;overflow:hidden;background:var(--rule);}
.card-body{padding:1.5rem;}
.card-hover-panel{position:absolute;top:-40px;left:-40px;right:-40px;bottom:-40px;background:#fff;z-index:100;opacity:0;pointer-events:none;transition:all 0.25s;transform:scale(0.85);display:flex;flex-direction:column;border-radius:12px;box-shadow:0 20px 50px rgba(0,0,0,0.2);}
.card:hover .card-hover-panel{opacity:1;pointer-events:auto;transform:scale(1.08);}
.ch-bottom{flex:1;padding:0.8rem;display:flex;gap:0.5rem;}
.ch-bottom img{flex:1;height:100%;object-fit:cover;border-radius:4px;}

/* ── DETAIL PAGE ── */
.det-layout{display:flex;gap:4rem;padding:5rem var(--g);}
.sci-paper{flex:1;font-family:'Lora',serif;}
.sci-fig-inner{background:#fff;padding:6px;border:1px solid #cbd5e1;border-radius:6px;margin-bottom:1rem;}
.sci-fig-inner img{width:100%;height:auto;display:block;}
.det-sidebar{width:300px;position:sticky;top:80px;height:fit-content;}

@media(max-width:900px){
  .hero-split,.det-layout{grid-template-columns:1fr;display:block;}
  .cards{grid-template-columns:1fr 1fr;}
  .card-hover-panel{display:none;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-in">
    <div class="nav-logo" onclick="go('pg-home')">HM<b>.</b></div>
    <ul class="nav-links">
      <li><a onclick="go('pg-home')">Home</a></li>
      <li><a onclick="go('pg-projects')">Projects</a></li>
    </ul>
    <a data-href="resumeLink" target="_blank" class="nav-cv">Resume ↓</a>
  </div>
</nav>

<div id="pg-home" class="pg on">
  <div class="wrap" style="padding-top:100px;">
    <div class="hero-split">
      <div>
        <h1 class="hero-h1">Mechanical Design Engineer</h1>
        <p>Building high-precision systems for industrial and competition environments.</p>
        <button class="btn" style="margin-top:2rem;" onclick="go('pg-projects')">View Projects</button>
      </div>
      <div class="img-container hero-photo">
        <img data-src="heroPic" alt="Profile" onerror="this.style.display='none';"/>
      </div>
    </div>
  </div>
</div>

<div id="pg-projects" class="pg">
  <div class="wrap" style="padding-top:100px;">
    <div class="cards" id="project-cards-container"></div>
  </div>
</div>

<div id="dynamic-pages-container"></div>

<script>
const PROJECT_ORDER = ['flowmeter', 'conveyor', 'stirling', 'rover', 'elevator', 'die'];
const DATA = {
    heroPic: "media/Hamza_photo.jpg",
    resumeLink: "https://drive.google.com/file/d/1tBVU8LNILnr-Cznld7hs2I8pGI609MhE/view?usp=sharing",
    flowmeter: { title: "Smart Turbine Flowmeter", cover: "media/flowmeter_fig1.jpeg", summary: "Most accurate of 35 teams.", tools: "SolidWorks|Python", abs: "A 6-inch turbine flowmeter.", obj: "Design for conventional cutting.", contrib: "Blade geometry design.", specs: "Accuracy:±16%|Pipe:6 inch", outcomes: "1st Place winner.", figs: ["media/flowmeter_fig1.jpeg", "media/turbine_manu.png", "media/flowmeter_fig2.jpeg"] },
    conveyor: { title: "Tea Bag Automation", cover: "media/tawlefa_Cpage.jpeg", summary: "6.6x cycle speed improvement.", tools: "SolidWorks|Sim", abs: "High speed packaging system.", obj: "Automate tea bag insertion.", contrib: "Simulation validation.", specs: "Speed:6.6x", outcomes: "1st Place IHUB.", figs: ["media/tawlefa_fig1.png", "media/tawlefa_Cpage.jpeg", "media/tawlefa_fig1.png"] },
    stirling: { title: "Stirling Engine", cover: "media/stiriling-fig1.png", summary: "Kinematic modeling analysis.", tools: "SolidWorks", abs: "Kinematic motion study.", obj: "Perfect phase angles.", contrib: "Mechanism modeling.", specs: "Phase:90 deg", outcomes: "Verified design.", figs: ["media/stiriling-fig1.png", "media/stiriling-fig2.png", "media/stiriling-fig1.png"] },
    rover: { title: "Mars Rover Suspension", cover: "media/sus_fig4.png", summary: "Manufactured for ERC Poland.", tools: "FEA|SolidWorks", abs: "4WD suspension system.", obj: "Stability on terrain.", contrib: "Geometry design.", specs: "Drive:4WD", outcomes: "Manufactured.", figs: ["media/sus_fig2.png", "media/sus_fig3.png", "media/sus_fig4.png"] },
    elevator: { title: "Elevator Cabin", cover: "media/elevator_cabin.png", summary: "Supervised 100+ part system.", tools: "Sheet Metal", abs: "DFMA elevator design.", obj: "Cost reduction.", contrib: "Sheet metal BOM.", specs: "Parts:100+", outcomes: "Zero errors.", figs: ["media/elevator_cabin.png", "media/elevator_mc.png", "media/elevator_cabin.png"] },
    die: { title: "Progressive Die", cover: "media/Progressive_die_Cpage.png", summary: "Sheet metal strip layout.", tools: "SolidWorks", abs: "Optimized die architecture.", obj: "Maximize utilization.", contrib: "Station design.", specs: "Op:Punching", outcomes: "Max material use.", figs: ["media/Progressive_die_Cpage.png", "media/Progressive_die_Cpage.png", "media/Progressive_die_Cpage.png"] }
};

document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll('[data-src]').forEach(el => el.src = DATA[el.getAttribute('data-src')]);
    document.querySelectorAll('[data-href]').forEach(el => el.href = DATA[el.getAttribute('data-href')]);

    const cont = document.getElementById('project-cards-container');
    const pages = document.getElementById('dynamic-pages-container');

    PROJECT_ORDER.forEach(id => {
        if(!DATA[id]) return;
        const p = DATA[id];
        cont.insertAdjacentHTML('beforeend', `
            <div class="card" onclick="go('pg-det-${id}')">
                <div class="card-cover"><img src="${p.cover}"/></div>
                <div class="card-body"><h3>${p.title}</h3><p>${p.summary}</p></div>
                <div class="card-hover-panel">
                    <div class="ch-cover"><img src="${p.cover}"/></div>
                    <div class="ch-bottom"><div class="ch-3imgs"><img src="${p.figs[0]}"/><img src="${p.figs[1]}"/><img src="${p.figs[2]}"/></div><div class="ch-cta">Explore Project</div></div>
                </div>
            </div>
        `);
        pages.insertAdjacentHTML('beforeend', `
            <div id="pg-det-${id}" class="pg">
                <div class="wrap det-layout">
                    <div class="sci-paper">
                        <h1>${p.title}</h1>
                        <p>${p.abs}</p>
                        <div class="sci-fig-inner"><img src="${p.figs[0]}"/></div>
                        <h2 class="sci-h2">Methodology</h2><p>${p.obj}</p>
                        <div class="sci-fig-inner"><img src="${p.figs[1]}"/></div>
                        <p>${p.outcomes}</p>
                    </div>
                    <div class="det-sidebar">
                        <img src="${p.figs[0]}" style="border:1px solid #ccc;"/>
                        <img src="${p.figs[1]}" style="border:1px solid #ccc;"/>
                    </div>
                </div>
            </div>
        `);
    });
});
function go(id){
    document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
    document.getElementById(id).classList.add('on');
    window.scrollTo(0,0);
}
</script>
</body>
</html>
