<title>Hamza Abd ElKadir | Mechanical Design Engineer</title>

<style>
/* ── RESET ─────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#c8102e; --redlt:#f7e8ea;
  --ink:#0f172a; --ink2:#334155; --ink3:#64748b;
  --paper:#f8fafc; --white:#fff; --rule:#e2e8f0;
  --fd:'Inter', sans-serif;
  --fb:'Inter', sans-serif;
  --mw:1160px; --g:clamp(1.25rem,4vw,3.5rem); --nh:60px;
  --ease:cubic-bezier(.19,1,.22,1);
}
html{font-size:16px; scroll-behavior: smooth;}
body{font-family:var(--fb);background:var(--paper);color:var(--ink);
     line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,h4{font-family:var(--fd);letter-spacing:-.025em;line-height:1.15}
a{color:inherit;text-decoration:none}
img, video{display:block;width:100%;height:100%;object-fit:cover}

/* ── UTILS ──────────────────────────────── */
.wrap{width:100%;max-width:var(--mw);margin-inline:auto;padding-inline:var(--g)}
.eyebrow{font-family:var(--fd);font-size:.65rem;font-weight:700;
         letter-spacing:.2em;text-transform:uppercase;color:var(--red)}
.divrow{display:flex;align-items:center;gap:1rem;margin-bottom:2.5rem}
.divrow::after{content:'';flex:1;height:1px;background:var(--rule)}

/* Global Absolute Image Container (For Cards/Hero) */
.img-container { position: relative; background: #fff; overflow: hidden; border: 1px solid #cbd5e1; padding: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
.img-container img, .img-container video { position: absolute; inset: 0; z-index: 2; width: 100%; height: 100%; object-fit: cover; }

/* 🌟 DEDICATED FIX FOR DETAILED PAGES (Restores Scroll & Aspect Ratio) 🌟 */
.sci-fig-inner { background: #fff; padding: 6px; border: 1px solid #cbd5e1; box-shadow: 0 4px 6px rgba(0,0,0,0.03); border-radius: 6px; margin-bottom: 1rem; }
.sci-fig-inner img { display: block; width: 100%; height: auto; border-radius: 2px; position: static; }

/* ── NAV ────────────────────────────────── */
nav{position:fixed;inset:0 0 auto 0;z-index:999;height:var(--nh);
    background:rgba(255,255,255,.98);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--rule); box-shadow: 0 1px 2px rgba(0,0,0,0.03);}
.nav-in{max-width:var(--mw);margin-inline:auto;padding-inline:var(--g);
        height:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--fd);font-size:1.1rem;font-weight:800;cursor:pointer; letter-spacing: -0.02em;}
.nav-logo b{color:var(--red)}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
             color:var(--ink3);position:relative;transition:color .15s;cursor:pointer}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:2px;
                    background:var(--red);transform:scaleX(0);transform-origin:left;
                    transition:transform .2s var(--ease)}
.nav-links a:hover,.nav-links a.act{color:var(--ink)}
.nav-links a.act::after,.nav-links a:hover::after{transform:scaleX(1)}
.nav-cv{font-family:var(--fd);font-size:.65rem;font-weight:700;letter-spacing:.05em;
        text-transform:uppercase;padding:.4rem 1.2rem; border-radius: 4px;
        border:1.5px solid var(--ink);color:var(--ink);transition:background .18s,color .18s; cursor: pointer;}
.nav-cv:hover{background:var(--ink);color:var(--white)}

/* ── HAMBURGER ── */
.nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; background: none; border: none; z-index: 1001; }
.nav-hamburger span { display: block; width: 24px; height: 2px; background: var(--ink); border-radius: 2px; transition: all 0.3s var(--ease); }
.nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.mobile-menu { display: none; position: fixed; top: var(--nh); left: 0; right: 0; background: rgba(255,255,255,0.99); border-bottom: 1px solid var(--rule); box-shadow: 0 8px 30px rgba(0,0,0,0.08); z-index: 998; padding: 1.5rem var(--g) 2rem; transform: translateY(-10px); opacity: 0; transition: transform 0.25s var(--ease), opacity 0.2s; pointer-events: none; }
.mobile-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
.mobile-menu ul { list-style: none; display: flex; flex-direction: column; gap: 0; }
.mobile-menu ul li a { display: block; padding: 1rem 0; font-size: 1.1rem; font-weight: 700; color: var(--ink); border-bottom: 1px solid var(--rule); cursor: pointer; letter-spacing: -0.01em; }
.mobile-menu ul li:last-child a { border-bottom: none; }
.mobile-menu-cv { margin-top: 1.5rem; display: block; text-align: center; font-family: var(--fd); font-size: .75rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: .9rem; border-radius: 4px; border: 1.5px solid var(--ink); color: var(--ink); background: var(--white); transition: background .18s, color .18s; }
.mobile-menu-cv:hover { background: var(--ink); color: var(--white); }

/* ── BUTTONS ───────────────────────────── */
.pg{display:none; animation: fadeIn 0.4s ease;}
.pg.on{display:block}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.btn{font-family:var(--fd);font-size:.7rem;font-weight:700;letter-spacing:.05em; text-transform:uppercase;padding:.8rem 1.6rem;border:1.5px solid var(--ink); background:var(--ink);color:var(--white);cursor:pointer;display:inline-block; transition:background .18s,border-color .18s,transform .12s; border-radius: 4px;}
.btn:hover{background:var(--red);border-color:var(--red);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--ink)}
.btn-ghost:hover{background:var(--ink);color:var(--white)}

/* ── HOME LAYOUT ─────────────────────────── */
#pg-home{padding-top:calc(var(--nh) + 5rem);padding-bottom:5rem}
.hero-split{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;margin-bottom:6rem}
.hero-ey{display:flex;align-items:center;gap:.65rem;margin-bottom:1.2rem}
.hero-ey-line{width:2rem;height:2px;background:var(--red);flex-shrink:0}
.hero-h1{font-size:clamp(2.8rem,5vw,5rem);font-weight:800;line-height:1.05;margin-bottom:.5rem; letter-spacing: -0.03em;}
.hero-h1 em{font-style:normal;color:var(--red)}
.hero-uni{font-family:var(--fd);font-size:.85rem;font-weight:600;color:var(--ink3);letter-spacing:.02em;margin-bottom:1.5rem}
.hero-bio{font-size:1.05rem;font-weight:400;color:var(--ink2);line-height:1.8;margin-bottom:2.5rem}
.hero-btns{display:flex;gap:.8rem;flex-wrap:wrap}
.hero-photo{aspect-ratio:4/5; border-radius: 6px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.15); overflow: hidden; position: relative;}

/* SKILLS STRIP */
.skills-strip { padding: 3rem 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); margin-bottom: 5rem; overflow: hidden; }
.skills-scroll { display: flex; gap: 2rem; animation: scrollSkills 30s linear infinite; width: max-content; }
.skills-scroll:hover { animation-play-state: paused; }
@keyframes scrollSkills { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.skill-chip { display: flex; align-items: center; gap: .5rem; padding: .5rem 1.2rem; border: 1px solid var(--rule); border-radius: 100px; background: var(--white); font-family: var(--fd); font-size: .7rem; font-weight: 600; letter-spacing: .04em; color: var(--ink2); white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
.skill-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); flex-shrink: 0; }

/* STATS BAR */
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; margin-bottom: 5rem; background: var(--white); box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
.stat-item { padding: 2rem 1.5rem; text-align: center; border-right: 1px solid var(--rule); transition: background 0.2s; }
.stat-item:last-child { border-right: none; }
.stat-item:hover { background: var(--redlt); }
.stat-num { font-size: clamp(2rem, 3vw, 2.8rem); font-weight: 900; color: var(--red); line-height: 1; letter-spacing: -0.03em; margin-bottom: .4rem; }
.stat-label { font-size: .7rem; font-weight: 600; color: var(--ink3); letter-spacing: .05em; text-transform: uppercase; }

.about-strip{padding-top:5rem;border-top:1px solid var(--rule)}
.about-grid{display:grid;grid-template-columns:240px 1fr;gap:4rem;align-items:start;margin-top:2rem}
.about-portrait{aspect-ratio:1; border-radius: 50%; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); overflow: hidden; position: relative;}
.about-h{font-size:clamp(1.6rem,2.5vw,2.2rem);font-weight:800;margin-bottom:1.2rem; letter-spacing: -0.02em;}
.about-p{font-size:1rem;font-weight:400;color:var(--ink2);line-height:1.8;margin-bottom:1rem}
.about-p strong{font-weight:600;color:var(--ink)}

.featured-badge { display: inline-flex; align-items: center; gap: .5rem; background: var(--ink); color: var(--white); font-size: .6rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: .3rem .8rem; border-radius: 3px; margin-bottom: 2.5rem; }
.featured-badge::before { content: '★'; color: #fbbf24; }

.contact-strip{padding-top:5rem;border-top:1px solid var(--rule);margin-top:5rem}
.cform-wrap{margin-top:3rem;display:grid;grid-template-columns:1fr 1fr;gap:4rem}
.clinks{list-style:none;display:flex;flex-direction:column;gap:1.2rem}
.clinks a{display:flex;align-items:center;gap:.8rem;font-size:.95rem;font-weight:500;color:var(--ink2);transition:color .15s}
.clinks a:hover{color:var(--red)}
.ci{width:18px;height:18px;color:var(--red);flex-shrink:0}
.cform{display:flex;flex-direction:column;gap:1.2rem}
.fg{display:flex;flex-direction:column;gap:.4rem}
.fl{font-family:var(--fd);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.fi,.fta{font-family:var(--fb);font-size:.95rem;color:var(--ink);background:var(--white); border:1px solid var(--rule);padding:.8rem 1rem;outline:none; border-radius: 4px; transition:border-color .15s;width:100%;resize:vertical}
.fi:focus,.fta:focus{border-color:var(--ink)}
.fta{min-height:120px}

/* ── CARDS (PROJECTS GRID) ──────────────── */
#pg-projects{padding-top:calc(var(--nh)+4rem);padding-bottom:5rem}
.filter-bar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:3rem}
.fb-btn{font-family:var(--fd);font-size:.65rem;font-weight:600;letter-spacing:.05em; text-transform:uppercase;padding:.5rem 1.2rem;border:1px solid var(--rule); border-radius: 4px; background:var(--white);color:var(--ink3);cursor:pointer;transition:all .15s}
.fb-btn:hover{border-color:var(--ink3);color:var(--ink2)}
.fb-btn.act{border-color:var(--red);background:var(--red);color:var(--white)}

.cards{ display:grid; grid-template-columns:repeat(3,1fr); gap:0; border-top:1px solid var(--rule); border-left:1px solid var(--rule); }
.card{ background:var(--white); display:flex; flex-direction:column; cursor:pointer; position:relative; border-right:1px solid var(--rule); border-bottom:1px solid var(--rule); transition: transform 0.3s var(--ease), z-index 0.3s; }
.card-cover{ overflow:hidden; aspect-ratio:3/2; position:relative; background:var(--rule); z-index: 1; border-bottom: 1px solid var(--rule); }
.card-cover video::-webkit-media-controls { display: none !important; }

/* 🌟 MASSIVE HOVER TAKEOVER PANEL 🌟 */
.card-hover-panel {
    position: absolute; 
    top: -40px; left: -40px; right: -40px; bottom: -40px; /* 40px Expansions */
    background: #fff; z-index: 100; 
    opacity: 0; pointer-events: none; 
    transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border-radius: 12px; box-shadow: 0 40px 100px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.05);
    display: flex; flex-direction: column; overflow: hidden; 
    transform: scale(0.85);
}
.card:hover { z-index: 50; } 
.card:hover .card-hover-panel, .card.is-hovered .card-hover-panel { 
    opacity: 1; pointer-events: auto; transform: scale(1.08); /* Massive Scale up */
}

/* Top Half: Takeover Video */
.ch-cover { height: 45%; width: 100%; position: relative; background: #111; border-bottom: 1px solid var(--rule); }
.ch-cover video, .ch-cover img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0;}
.ch-cover video::-webkit-media-controls { display: none !important; }

/* 🌟 BOTTOM HALF: MASSIVE IMAGE FLEX TRICK 🌟 */
.ch-bottom { 
    height: 55%; 
    padding: 0.6rem; 
    display: flex; 
    flex-direction: column; 
    justify-content: space-between;
    background: #fff; 
}
.ch-3imgs { 
    display: flex; 
    gap: 0.5rem; 
    flex: 1; /* Forces the container to stretch perfectly */
    min-height: 0; 
    margin-bottom: 0.5rem; 
}
.ch-3imgs img { 
    flex: 1; /* Forces all 3 to share horizontal space equally */
    width: 0; 
    height: 100%; /* Stretches from top to bottom */
    object-fit: cover; 
    border-radius: 4px; 
    border
